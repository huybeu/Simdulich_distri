name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.0.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: |
            cd /var/www/simdulich
            git pull
            npm install --prefix backend
            npm install --prefix frontend
            VITE_BASE_PATH=/distri/ npm run build --prefix frontend
            pm2 restart simdulich-api
            echo "Deploy xong!"
